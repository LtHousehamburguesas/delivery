<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lt' House</title>
<meta name="description" content="Parrilla. Leña. Oficio.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F1EDE3;
    --brown:#2B140C;
    --brown-soft:#4A2A1D;
    --brasa:#E15A1E;
    --brasa-dim:#C9490F;
    --line: rgba(43,20,12,0.14);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html{ -webkit-tap-highlight-color: transparent; }

  body{
    background:var(--cream);
    color:var(--brown);
    font-family:'Poppins', sans-serif;
    min-height:100svh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 9vh 20px 40px;
    position:relative;
    overflow-x:hidden;
  }

  /* textura sutil de fondo */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(43,20,12,0.035) 0, transparent 40%),
      radial-gradient(circle at 85% 75%, rgba(225,90,30,0.05) 0, transparent 45%);
    z-index:0;
  }

  .wrap{
    width:100%;
    max-width:440px;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    z-index:1;
  }

  .eyebrow{
    font-size:11px;
    letter-spacing:0.22em;
    font-weight:600;
    color:var(--brasa-dim);
    text-transform:uppercase;
    margin-bottom:18px;
  }
  .eyebrow span{ color: var(--brown-soft); opacity:.5; margin:0 6px; }

  .logo-img{
    width:100%;
    max-width:320px;
    height:auto;
    display:block;
  }

  .tagline{
    margin-top:14px;
    font-size:14px;
    font-weight:500;
    color:var(--brown-soft);
    text-align:center;
    letter-spacing:0.01em;
  }

  .divider{
    margin:34px 0 30px;
    color:var(--brasa);
    font-size:13px;
    letter-spacing:0.3em;
    opacity:.7;
  }

  .links{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .card{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    width:100%;
    text-decoration:none;
    background:var(--brown);
    color:var(--cream);
    border-radius:14px;
    padding:20px 22px;
    border:1px solid var(--brown);
    transition: transform .18s ease, background .18s ease, border-color .18s ease;
  }
  .card:hover{
    background:var(--brasa);
    border-color:var(--brasa);
    transform: translateY(-2px);
  }
  .card:active{ transform: translateY(0); }
  .card:focus-visible{
    outline:2px solid var(--brasa);
    outline-offset:3px;
  }

  .card-text{ display:flex; flex-direction:column; gap:3px; }

  .card-eyebrow{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.16em;
    font-weight:600;
    color: rgba(241,237,227,0.55);
  }
  .card:hover .card-eyebrow{ color: rgba(43,20,12,0.6); }

  .card-title{
    font-family:'Anton', sans-serif;
    font-size:19px;
    text-transform:uppercase;
    letter-spacing:0.01em;
  }

  .card-sub{
    font-size:12.5px;
    font-weight:400;
    color: rgba(241,237,227,0.75);
  }
  .card:hover .card-sub{ color: rgba(43,20,12,0.75); }

  .arrow{
    flex-shrink:0;
    font-size:20px;
    color:var(--brasa);
    transition: color .18s ease, transform .18s ease;
  }
  .card:hover .arrow{ color:var(--brown); transform: translateX(3px); }

  footer{
    margin-top:44px;
    text-align:center;
    font-size:12px;
    color: var(--brown-soft);
    opacity:.65;
    letter-spacing:0.02em;
  }

  footer .brand{
    display:block;
    margin-top:6px;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    opacity:.8;
  }

  @media (prefers-reduced-motion: reduce){
    .card{ transition:none; }
  }
</style>
</head>
